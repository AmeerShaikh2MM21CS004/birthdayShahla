<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const mainContainer = document.getElementById("mainContainer");
const heartEffectContainer = document.getElementById("heartEffectContainer");
const resultContainer = document.getElementById("resultContainer");
const loveSound = document.getElementById("loveSound");
const noSound = document.getElementById("noSound");
const loadingText = document.getElementById("loadingText");
const textElement = document.getElementById("typeEffect");

const messages = [
  "Don't even try to escape 😏",
  "Bet you can't catch the No button 😜",
  "Only brave people click No 😎",
  "Careful... No is slippery 👀",
  "Try hitting No if you can 🤭",
  "Only legends catch the No button 🔥",
  "Click No if you're heartless 💔",
  "No hugs if you press No 🐼",
  "Think you're smart? Catch No 😌",
  "One click away from truth 😍"
];

let messageIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeLoop() {
    const currentText = messages[messageIndex];

    if (isDeleting) {
        charIndex--;
    } else {
        charIndex++;
    }

    textElement.textContent = currentText.substring(0, charIndex);

    let speed = isDeleting ? 35 : 60;

    if (!isDeleting && charIndex === currentText.length) {
        speed = 1200;
        isDeleting = true;
    }

    if (isDeleting && charIndex === 0) {
        isDeleting = false;
        messageIndex = (messageIndex + 1) % messages.length;
        speed = 400;
    }

    setTimeout(typeLoop, speed);
}

typeLoop();

function moveNoButton() {
    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding - 80;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    noBtn.style.zIndex = "999";
}

noBtn.addEventListener("mouseenter", () => {
    noSound.currentTime = 0;
    noSound.play();
    moveNoButton();
});

noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNoButton();
});

/* YES BUTTON */
yesBtn.addEventListener("click", () => {
    mainContainer.style.display = "none";
    heartEffectContainer.style.display = "block";
    loveSound.play();

    let percent = 0;

    const heartInterval = setInterval(() => {
        percent++;
        loadingText.innerHTML = `Processing your honesty.. ${percent}% ❤️`;

        createHeart();

        if (percent >= 100) {
            clearInterval(heartInterval);
            heartEffectContainer.style.display = "none";
            resultContainer.style.display = "block";
        }
    }, 30);
});

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}
</script>
